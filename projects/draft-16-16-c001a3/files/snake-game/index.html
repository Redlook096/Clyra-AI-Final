<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .game-container {
        background: #16213e;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
    }
    canvas {
        border: 2px solid #0f3460;
        border-radius: 4px;
        display: block;
        margin: 0 auto;
        background: #0a0a1a;
    }
    .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        color: #e94560;
        font-size: 20px;
        font-weight: bold;
    }
    .score { color: #e94560; }
    .high-score { color: #f5a623; }
    .overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.7);
        color: white;
        border-radius: 4px;
        pointer-events: none;
    }
    .overlay h1 { font-size: 36px; margin-bottom: 10px; }
    .overlay p { font-size: 18px; color: #ccc; }
    .canvas-wrapper {
        position: relative;
        display: inline-block;
    }
    .controls {
        color: #aaa;
        font-size: 14px;
        margin-top: 8px;
    }
    .controls span { margin: 0 10px; }
</style>
</head>
<body>
<div class="game-container">
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="overlay" id="overlay" style="display:none;">
            <h1 id="overlayTitle">Game Over</h1>
            <p id="overlaySub">Press SPACE or ENTER to restart</p>
        </div>
    </div>
    <div class="hud">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>
    </div>
    <div class="controls">
        <span>↑ ↓ ← →</span> or <span>W A S D</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub = document.getElementById('overlaySub');

    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;
    const TICK_MS = 150;

    let snake, food, direction, nextDirection, score, highScore, gameOver, gameLoop;

    function init() {
        const mid = Math.floor(GRID_SIZE / 2);
        snake = [
            {x: mid, y: mid},
            {x: mid - 1, y: mid},
            {x: mid - 2, y: mid}
        ];
        direction = {x: 1, y: 0};
        nextDirection = {x: 1, y: 0};
        score = 0;
        gameOver = false;
        scoreEl.textContent = '0';
        overlay.style.display = 'none';
        spawnFood();
        draw();
    }

    function spawnFood() {
        const maxAttempts = 1000;
        for (let i = 0; i < maxAttempts; i++) {
            const x = Math.floor(Math.random() * GRID_SIZE);
            const y = Math.floor(Math.random() * GRID_SIZE);
            if (!snake.some(seg => seg.x === x && seg.y === y)) {
                food = {x, y};
                return;
            }
        }
        // If somehow full, check every cell
        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                if (!snake.some(seg => seg.x === x && seg.y === y)) {
                    food = {x, y};
                    return;
                }
            }
        }
        // No space — player wins!
        gameOver = true;
    }

    function update() {
        if (gameOver) return;

        direction = {...nextDirection};

        const head = {
            x: snake[0].x + direction.x,
            y: snake[0].y + direction.y
        };

        // Wall collision
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
            endGame();
            return;
        }

        // Self collision
        if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            endGame();
            return;
        }

        snake.unshift(head);

        // Check food
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = score;
            spawnFood();
        } else {
            snake.pop();
        }

        draw();
    }

    function endGame() {
        gameOver = true;
        const prevHigh = parseInt(highScoreEl.textContent) || 0;
        if (score > prevHigh) {
            highScoreEl.textContent = score;
        }
        overlayTitle.textContent = 'Game Over';
        overlaySub.textContent = 'Press SPACE or ENTER to restart';
        overlay.style.display = 'flex';
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw grid lines
        ctx.strokeStyle = '#1a1a3e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(canvas.width, i * CELL_SIZE);
            ctx.stroke();
        }

        // Draw food
        ctx.fillStyle = '#e94560';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 8;
        const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
        const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
        ctx.beginPath();
        ctx.arc(fx, fy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Draw snake
        snake.forEach((seg, i) => {
            const x = seg.x * CELL_SIZE;
            const y = seg.y * CELL_SIZE;
            const padding = 1;

            if (i === 0) {
                // Head
                ctx.fillStyle = '#4ecca3';
                ctx.shadowColor = '#4ecca3';
                ctx.shadowBlur = 6;
            } else {
                // Body
                const ratio = 1 - (i / snake.length) * 0.5;
                const g = Math.floor(204 * ratio);
                ctx.fillStyle = `rgb(78, ${g}, 163)`;
                ctx.shadowBlur = 0;
            }

            ctx.fillRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2);
        });
        ctx.shadowBlur = 0;

        // Draw eyes on head
        if (snake.length > 0 && !gameOver) {
            const head = snake[0];
            const hx = head.x * CELL_SIZE;
            const hy = head.y * CELL_SIZE;
            ctx.fillStyle = '#0a0a1a';
            const eyeSize = 3;
            let ex1, ey1, ex2, ey2;
            if (direction.x === 1) {
                ex1 = hx + CELL_SIZE - 6; ey1 = hy + 5;
                ex2 = hx + CELL_SIZE - 6; ey2 = hy + CELL_SIZE - 5;
            } else if (direction.x === -1) {
                ex1 = hx + 6; ey1 = hy + 5;
                ex2 = hx + 6; ey2 = hy + CELL_SIZE - 5;
            } else if (direction.y === 1) {
                ex1 = hx + 5; ey1 = hy + CELL_SIZE - 6;
                ex2 = hx + CELL_SIZE - 5; ey2 = hy + CELL_SIZE - 6;
            } else {
                ex1 = hx + 5; ey1 = hy + 6;
                ex2 = hx + CELL_SIZE - 5; ey2 = hy + 6;
            }
            ctx.beginPath();
            ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function startLoop() {
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, TICK_MS);
    }

    function restart() {
        init();
        startLoop();
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
        const key = e.key;

        if ((key === ' ' || key === 'Enter') && gameOver) {
            e.preventDefault();
            restart();
            return;
        }

        if (gameOver) return;
        e.preventDefault();

        let newDir = null;
        if (key === 'ArrowUp' || key === 'w' || key === 'W') newDir = {x: 0, y: -1};
        else if (key === 'ArrowDown' || key === 's' || key === 'S') newDir = {x: 0, y: 1};
        else if (key === 'ArrowLeft' || key === 'a' || key === 'A') newDir = {x: -1, y: 0};
        else if (key === 'ArrowRight' || key === 'd' || key === 'D') newDir = {x: 1, y: 0};

        if (newDir) {
            // Prevent 180-degree reversal
            if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
                nextDirection = newDir;
            }
        }
    });

    // Touch support for mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        if (gameOver) {
            e.preventDefault();
            restart();
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (gameOver) return;
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;

        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0) {
                if (direction.x !== -1) nextDirection = {x: 1, y: 0};
            } else {
                if (direction.x !== 1) nextDirection = {x: -1, y: 0};
            }
        } else {
            if (dy > 0) {
                if (direction.y !== -1) nextDirection = {x: 0, y: 1};
            } else {
                if (direction.y !== 1) nextDirection = {x: 0, y: -1};
            }
        }
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    }, {passive: false});

    // Start the game
    highScore = parseInt(highScoreEl.textContent) || 0;
    restart();
</script>
</body>
</html>
