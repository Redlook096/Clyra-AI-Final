<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium, production-ready calculator app.">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-container">
    <div class="calculator-wrapper">
      <!-- Header -->
      <header class="calc-header">
        <h1>Calculator</h1>
        <button class="btn-icon history-toggle" id="history-toggle" aria-label="Toggle calculation history" title="History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </header>

      <!-- Calculator Body -->
      <div class="calculator">
        <!-- Display -->
        <div class="display">
          <div class="display-expression" id="display-expression" aria-live="polite"></div>
          <div class="display-result" id="display-result" aria-live="assertive">0</div>
        </div>

        <!-- Button Grid -->
        <div class="button-grid" role="group" aria-label="Calculator buttons">
          <!-- Row 1: Functions -->
          <button class="btn btn-history" data-action="history" aria-label="History">&#8986;</button>
          <button class="btn btn-func" data-action="sqrt" aria-label="Square root">&radic;</button>
          <button class="btn btn-func" data-action="square" aria-label="Square">x&sup2;</button>
          <button class="btn btn-func" data-action="reciprocal" aria-label="Reciprocal">&sup1;/&#x2093;</button>
          <button class="btn btn-func" data-action="percent" aria-label="Percentage">%</button>

          <!-- Row 2 -->
          <span class="btn-placeholder"></span>
          <button class="btn btn-clear" data-action="clear" aria-label="Clear all">AC</button>
          <button class="btn btn-func" data-action="negate" aria-label="Negate">&plusmn;</button>
          <button class="btn btn-func" data-action="backspace" aria-label="Backspace">&larr;</button>
          <button class="btn btn-operator" data-action="divide" aria-label="Divide">&divide;</button>

          <!-- Row 3 -->
          <button class="btn btn-number" data-value="7">7</button>
          <button class="btn btn-number" data-value="8">8</button>
          <button class="btn btn-number" data-value="9">9</button>
          <button class="btn btn-operator" data-action="multiply" aria-label="Multiply">&times;</button>
          <span class="btn-placeholder"></span>

          <!-- Row 4 -->
          <button class="btn btn-number" data-value="4">4</button>
          <button class="btn btn-number" data-value="5">5</button>
          <button class="btn btn-number" data-value="6">6</button>
          <button class="btn btn-operator" data-action="subtract" aria-label="Subtract">&minus;</button>
          <span class="btn-placeholder"></span>

          <!-- Row 5 -->
          <button class="btn btn-number" data-value="1">1</button>
          <button class="btn btn-number" data-value="2">2</button>
          <button class="btn btn-number" data-value="3">3</button>
          <button class="btn btn-operator" data-action="add" aria-label="Add">+</button>
          <span class="btn-placeholder"></span>

          <!-- Row 6 -->
          <span class="btn-placeholder"></span>
          <button class="btn btn-number" data-value="0">0</button>
          <button class="btn btn-number" data-value=".">.</button>
          <span class="btn-placeholder"></span>
          <button class="btn btn-equals" data-action="calculate" aria-label="Equals">=</button>
        </div>

      <!-- History Panel -->
      <aside class="history-panel" id="history-panel" aria-label="Calculation history" hidden>
        <div class="history-header">
          <h2>History</h2>
          <button class="btn btn-sm" id="clear-history-btn" aria-label="Clear history">Clear</button>
        </div>
        <ul class="history-list" id="history-list" aria-label="History entries"></ul>
        <div class="history-empty" id="history-empty">No calculations yet.</div>
      </aside>
    </div>
  </main>

  <template id="history-entry-template">
    <li class="history-entry" data-expression="" data-result="">
      <span class="history-expression"></span>
      <span class="history-result"></span>
    </li>
  </template>

  <script src="js/calcModel.js"></script>
  <script src="js/calcView.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
