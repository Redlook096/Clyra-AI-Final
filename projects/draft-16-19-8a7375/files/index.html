<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Snake</h1>
        <div id="score-board">
            <span>Score: <span id="score">0</span></span>
            <span>High Score: <span id="high-score">0</span></span>
        </div>
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="controls">
            <button id="start-btn">Start Game</button>
            <p id="game-status">Press "Start Game" or any arrow key to begin</p>
        </div>
        <div id="mobile-controls">
            <button class="arrow-btn" id="up-btn">&#9650;</button>
            <div>
                <button class="arrow-btn" id="left-btn">&#9664;</button>
                <button class="arrow-btn" id="down-btn">&#9660;</button>
                <button class="arrow-btn" id="right-btn">&#9654;</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
