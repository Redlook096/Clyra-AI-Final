<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/calculator.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <main class="app-container">
    <div class="calculator" role="application" aria-label="Calculator">
      <!-- Header -->
      <div class="calculator-header">
        <span class="calculator-title">Calculator</span>
        <button class="history-toggle" aria-label="Toggle history" title="History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </div>

      <!-- Display -->
      <div class="display">
        <div class="display-expression" id="expression" aria-live="polite"></div>
        <div class="display-result" id="result" aria-live="assertive">0</div>
      </div>

      <!-- History Panel -->
      <div class="history-panel" id="historyPanel" aria-label="Calculation history">
        <div class="history-header">
          <span>History</span>
          <button class="history-clear" id="historyClear" aria-label="Clear history">Clear</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

      <!-- Keypad -->
      <div class="keypad" role="group" aria-label="Calculator keypad">
        <button class="key key-function key-clear" data-action="clear" aria-label="Clear">C</button>
        <button class="key key-function key-backspace" data-action="backspace" aria-label="Backspace">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/>
            <line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
        <button class="key key-function key-percent" data-action="percent" aria-label="Percent">%</button>
        <button class="key key-operator key-divide" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <button class="key key-number" data-action="number" data-value="7">7</button>
        <button class="key key-number" data-action="number" data-value="8">8</button>
        <button class="key key-number" data-action="number" data-value="9">9</button>
        <button class="key key-operator key-multiply" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <button class="key key-number" data-action="number" data-value="4">4</button>
        <button class="key key-number" data-action="number" data-value="5">5</button>
        <button class="key key-number" data-action="number" data-value="6">6</button>
        <button class="key key-operator key-subtract" data-action="operator" data-value="-" aria-label="Subtract">−</button>

        <button class="key key-number" data-action="number" data-value="1">1</button>
        <button class="key key-number" data-action="number" data-value="2">2</button>
        <button class="key key-number" data-action="number" data-value="3">3</button>
        <button class="key key-operator key-add" data-action="operator" data-value="+" aria-label="Add">+</button>

        <button class="key key-sign" data-action="sign" aria-label="Toggle sign">+/−</button>
        <button class="key key-number" data-action="number" data-value="0">0</button>
        <button class="key key-decimal" data-action="decimal" data-value="." aria-label="Decimal point">.</button>
        <button class="key key-equals" data-action="equals" aria-label="Equals">=</button>
      </div>
    </div>
  </main>

  <script src="js/evaluate.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/display.js"></script>
  <script src="js/history.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
