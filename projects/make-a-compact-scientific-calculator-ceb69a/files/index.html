<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator" role="application" aria-label="Scientific Calculator">
    <!-- Display Area -->
    <div class="display">
      <div class="display-indicators">
        <span class="indicator indicator-memory" id="memIndicator" aria-label="Memory stored"></span>
        <span class="indicator indicator-angle" id="angleIndicator">DEG</span>
      </div>
      <div class="display-expression" id="expression" aria-live="polite"></div>
      <div class="display-result" id="result" aria-live="assertive">0</div>
    </div>

    <!-- Memory Row -->
    <div class="mem-row">
      <button class="btn btn-mem" data-action="mc">MC</button>
      <button class="btn btn-mem" data-action="mr">MR</button>
      <button class="btn btn-mem" data-action="ms">MS</button>
      <button class="btn btn-mem" data-action="m-plus">M+</button>
      <button class="btn btn-mem" data-action="m-minus">M−</button>
    </div>

    <!-- Scientific Button Grid -->
    <div class="button-grid">
      <!-- Row 1 -->
      <button class="btn btn-func" data-action="lparen">(</button>
      <button class="btn btn-func" data-action="rparen">)</button>
      <button class="btn btn-clear" data-action="clear">C</button>
      <button class="btn btn-clear" data-action="backspace">⌫</button>

      <!-- Row 2 -->
      <button class="btn btn-func" data-action="sin">sin</button>
      <button class="btn btn-func" data-action="cos">cos</button>
      <button class="btn btn-func" data-action="tan">tan</button>
      <button class="btn btn-op" data-action="divide">÷</button>

      <!-- Row 3 -->
      <button class="btn btn-func" data-action="log">log</button>
      <button class="btn btn-func" data-action="ln">ln</button>
      <button class="btn btn-func" data-action="sqrt">√</button>
      <button class="btn btn-op" data-action="multiply">×</button>

      <!-- Row 4 -->
      <button class="btn btn-func" data-action="square">x²</button>
      <button class="btn btn-func" data-action="power">xⁿ</button>
      <button class="btn btn-const" data-action="pi">π</button>
      <button class="btn btn-op" data-action="subtract">−</button>

      <!-- Row 5 -->
      <button class="btn btn-num" data-action="7">7</button>
      <button class="btn btn-num" data-action="8">8</button>
      <button class="btn btn-num" data-action="9">9</button>
      <button class="btn btn-op" data-action="add">+</button>

      <!-- Row 6 -->
      <button class="btn btn-num" data-action="4">4</button>
      <button class="btn btn-num" data-action="5">5</button>
      <button class="btn btn-num" data-action="6">6</button>
      <button class="btn btn-equals" data-action="equals">=</button>

      <!-- Row 7 -->
      <button class="btn btn-num" data-action="1">1</button>
      <button class="btn btn-num" data-action="2">2</button>
      <button class="btn btn-num" data-action="3">3</button>
      <button class="btn btn-func" data-action="ans">Ans</button>

      <!-- Row 8 -->
      <button class="btn btn-num" data-action="0">0</button>
      <button class="btn btn-num" data-action="decimal">.</button>
      <button class="btn btn-func" data-action="negate">(‑)</button>
      <button class="btn btn-func" data-action="exp">EXP</button>

      <!-- Angle mode toggle spanning full width -->
      <button class="btn btn-angle" data-action="angle-toggle">DEG</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
