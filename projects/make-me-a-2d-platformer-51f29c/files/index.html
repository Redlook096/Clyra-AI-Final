<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Platformer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div class="hud-left">
      <span id="scoreDisplay">Score: 0</span>
      <span id="coinDisplay">🪙 0</span>
    </div>
    <div class="hud-right">
      <span id="livesDisplay">❤️ ❤️ ❤️</span>
      <span id="levelDisplay">Level 1</span>
    </div>
  </div>

  <!-- Start screen overlay -->
  <div id="startScreen" class="overlay">
    <div class="overlay-content">
      <h1>🎮 PLATFORMER</h1>
      <p>Arrow keys / WASD to move</p>
      <p>Space / Up / W to jump</p>
      <p>Double jump available!</p>
      <p class="blink">Press SPACE to start</p>
    </div>
  </div>

  <!-- Game Over overlay -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="overlay-content">
      <h1>💀 GAME OVER</h1>
      <p id="finalScore">Score: 0</p>
      <p class="blink">Press SPACE to restart</p>
    </div>
  </div>

  <!-- Victory overlay -->
  <div id="victoryScreen" class="overlay hidden">
    <div class="overlay-content">
      <h1>🎉 YOU WIN!</h1>
      <p id="victoryScore">Score: 0</p>
      <p class="blink">Press SPACE to play again</p>
    </div>
  </div>

  <script src="js/input.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/player.js"></script>
  <script src="js/level.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/items.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
